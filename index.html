<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login 2</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <section id="login">
            
            <div id="formulario">
                <h1>Login</h1>
                <form action="login.php" method="post" autocomplete="on">
                    <p>Email</p>
                    <div class="campo">
                    <label for="ilogin">Email</label>
                    <input type="email" name="login" id="ilogin" placeholder="Seu Email" autocomplete="email">
                    </div>

                    <p>Password <a href="#">Forgot Password ?</a></p>
                        <div class="campo">
                        <label for="ipassword">Password</label>
                        <input type="password" name="password" id="ipassword" placeholder="Sua senha" autocomplete="current-password">
                    </div>

                    <div id="remember">
                        <input type="checkbox" name="remember" id="iremember">
                        <label for="iremember">Remember me</label>
                    </div>

                    <input type="submit" value="LOGIN">

                </form>
            </div>
        </section>
    </main>
    
</body>
</html>
